services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: ap-southeast-1
      OCR_API_KEY: ${OCR_API_KEY:-testkey}
      OCR_S3_BUCKET: ${OCR_S3_BUCKET:-test}
      OCR_SQS_URL: ${OCR_SQS_URL:-test}
      OCR_DDB_TABLE: ${OCR_DDB_TABLE:-test}
    volumes:
      - ~/.aws:/root/.aws:ro

  worker:
    build: ./worker
    environment:
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-60}
      WORKER_SEED_RECORDS: ${WORKER_SEED_RECORDS:-10}
